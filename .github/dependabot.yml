version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions-patch-minor:
        update-types: ["patch", "minor"]
      actions-major:
        update-types: ["major"]
    commit-message:
      prefix: "ci"

  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      gomod-patch-minor:
        update-types: ["patch", "minor"]
      gomod-major:
        update-types: ["major"]
    commit-message:
      prefix: "deps"
