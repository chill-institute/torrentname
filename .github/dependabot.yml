version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: monday
    groups:
      actions-patch-minor:
        update-types: ["patch", "minor"]
      actions-major:
        update-types: ["major"]
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: gomod
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: monday
    groups:
      gomod-patch-minor:
        update-types: ["patch", "minor"]
      gomod-major:
        update-types: ["major"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "go"
