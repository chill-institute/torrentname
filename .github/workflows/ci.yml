name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            printf 'gofmt needs to be run on:\n%s\n' "$unformatted" >&2
            exit 1
          fi

      - name: Check module metadata
        run: go mod tidy -diff

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out

  fuzz:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run parser fuzz target
        run: go test . -run=^$ -fuzz=FuzzParse -fuzztime=5s

  benchmarks:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run parser benchmarks
        run: go test . -run=^$ -bench=BenchmarkParse -benchmem -count=1
