[tools]
go = "1.26.1"

[env]
GOWORK = "off"

[tasks.fmt]
description = "Format Go sources"
run = """
gofmt_bin="$(dirname "$(mise which go)")/gofmt"
go_files="$(git ls-files '*.go')"
if [ -z "$go_files" ]; then
  exit 0
fi

printf '%s\n' "$go_files" | while IFS= read -r file; do
  [ -n "$file" ] || continue
  [ -f "$file" ] || continue
  "$gofmt_bin" -w "$file"
done
"""

[tasks."fmt:check"]
description = "Check Go source formatting"
run = """
gofmt_bin="$(dirname "$(mise which go)")/gofmt"
go_files="$(git ls-files '*.go')"
if [ -z "$go_files" ]; then
  exit 0
fi

unformatted="$(printf '%s\n' "$go_files" | while IFS= read -r file; do
  [ -n "$file" ] || continue
  [ -f "$file" ] || continue
  "$gofmt_bin" -l "$file"
done)"

if [ -n "$unformatted" ]; then
  printf 'gofmt needs to be run on:\n%s\n' "$unformatted" >&2
  exit 1
fi

printf '==> Go formatting is clean\n'
"""

[tasks."mod:tidy"]
description = "Tidy Go module metadata"
run = '"$(mise which go)" mod tidy'

[tasks."mod:check"]
description = "Ensure go.mod and go.sum are tidy without mutating them"
run = '"$(mise which go)" mod tidy -diff'

[tasks.test]
description = "Run parser unit tests"
run = '"$(mise which go)" test ./...'

[tasks.vet]
description = "Run Go static checks"
run = '"$(mise which go)" vet ./...'

[tasks."test:cover"]
description = "Run parser tests with coverage"
run = '"$(mise which go)" test ./... -cover'

[tasks."corpus:metrics"]
description = "Report parser field coverage across committed Jackett fixtures"
run = """
"$(mise which go)" run ./cmd/corpusmetrics \
  --min release_info=100 \
  --min title=100 \
  --min resolution=90 \
  --min quality=80 \
  --min codec=95 \
  --min audio=65 \
  --min source=20 \
  --min group=50
"""

[tasks.bench]
description = "Run parser benchmarks"
run = '"$(mise which go)" test ./... -bench=. -benchmem'

[tasks."bench:record"]
description = "Record parser benchmark output for before/after comparison"
run = """
set -o pipefail
out="${BENCH_OUT:-tmp/bench/current.txt}"
mkdir -p "$(dirname "$out")"
"$(mise which go)" test . -run=^$ -bench=BenchmarkParse -benchmem -count="${BENCH_COUNT:-5}" | tee "$out"
"""

[tasks."bench:compare"]
description = "Compare two parser benchmark output files"
run = """
baseline="${BENCH_BASELINE:-tmp/bench/baseline.txt}"
current="${BENCH_CURRENT:-tmp/bench/current.txt}"
"$(mise which go)" tool benchstat "$baseline" "$current"
"""

[tasks."fixtures:jackett"]
description = "Refresh curated Jackett search fixtures from a live local Jackett"
run = """
if [ -z "${JACKETT_API_KEY:-}" ]; then
  printf 'JACKETT_API_KEY is required\n' >&2
  exit 1
fi

JACKETT_BASE_URL="${JACKETT_BASE_URL:-http://localhost:9117}" \
"$(mise which go)" run ./cmd/jackettfixtures
"""

[tasks."test:fuzz"]
description = "Run the parser fuzz target for a short local pass"
run = '"$(mise which go)" test . -run=^$ -fuzz=FuzzParse -fuzztime=5s'

[tasks.verify]
description = "Run formatting, static, and test checks"
depends = ["fmt:check", "mod:check", "vet", "test", "corpus:metrics"]
